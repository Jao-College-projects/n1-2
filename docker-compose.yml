# Stack local: PostgreSQL (host 5434) + Tomcat 10 com WAR luar-api (host 8082 → 8080 no container)
#
# Uso típico (na raiz do repo):
#   ./scripts/stack-up.sh
#
# Ou manualmente:
#   cd apps/api && mvn clean package && cd ../..
#   docker compose up -d

services:
  db-java:
    image: postgres:16-alpine
    container_name: luar-java-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luar_java
    volumes:
      - ./database/java/schema_java_standalone.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luar_java"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

  tomcat:
    image: tomcat:10-jdk17-temurin-jammy
    container_name: luar-java-tomcat
    depends_on:
      db-java:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      JDBC_URL: jdbc:postgresql://db-java:5432/luar_java?sslmode=disable
      JDBC_USER: postgres
      JDBC_PASSWORD: postgres
    volumes:
      - ./apps/api/target/luar-api.war:/usr/local/tomcat/webapps/luar-api.war:ro
